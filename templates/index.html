<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xray SOCKS5 IPv6 Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:20px}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:24px;font-weight:600;color:#f8fafc}
.header p{color:#94a3b8;margin-top:6px;font-size:14px}
.toolbar{display:flex;gap:12px;justify-content:center;margin:20px 0 30px;flex-wrap:wrap}
.btn{padding:10px 24px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover:not(:disabled){background:#2563eb}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover:not(:disabled){background:#dc2626}
.btn-success{background:#10b981;color:#fff}
.btn-success:hover:not(:disabled){background:#059669}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px}
.card{background:#1e293b;border-radius:12px;border:1px solid #334155;overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center}
.card-header h2{font-size:16px;font-weight:500}
.badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:#065f46;color:#6ee7b7}
.badge-red{background:#7f1d1d;color:#fca5a5}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #334155;background:#172032}
td{padding:14px 16px;border-bottom:1px solid #1e293b;font-size:14px}
tr:hover td{background:#1a2744}
.ipv6-cell{font-family:'SF Mono',SFMono-Regular,Menlo,monospace;font-size:13px;color:#93c5fd}
.port-cell{font-weight:600;color:#f8fafc}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.status-dot.green{background:#10b981;box-shadow:0 0 6px #10b98a}
.status-dot.red{background:#ef4444;box-shadow:0 0 6px #ef4444}
.toast{position:fixed;top:20px;right:20px;padding:14px 20px;border-radius:10px;font-size:14px;z-index:9999;transform:translateX(120%);transition:transform .3s ease;max-width:400px}
.toast.show{transform:translateX(0)}
.toast-success{background:#065f46;color:#6ee7b7;border:1px solid #059669}
.toast-error{background:#7f1d1d;color:#fca5a5;border:1px solid #dc2626}
.toast-info{background:#1e3a5f;color:#93c5fd;border:1px solid #3b82f6}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:#64748b}
.empty-state p{margin-top:10px;font-size:14px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Xray SOCKS5 IPv6 管理面板</h1>
    <p>每个 SOCKS5 端口绑定独立 IPv6 出口地址</p>
  </div>

  <div class="toolbar">
    <button class="btn btn-primary" id="btnInit" onclick="doInit()">
      <span id="initText">一键初始化</span>
    </button>
    <button class="btn btn-danger" id="btnChangeAll" onclick="doChangeAll()" style="display:none">
      <span id="changeAllText">一键换全部 IP</span>
    </button>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>SOCKS5 端口列表</h2>
      <span class="badge badge-green" id="serviceBadge" style="display:none">XrayL 运行中</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>端口</th>
          <th>IPv6 出口地址</th>
          <th>绑定状态</th>
          <th style="text-align:right">操作</th>
        </tr>
      </thead>
      <tbody id="portTable">
        <tr><td colspan="4" class="empty-state"><p>点击"一键初始化"开始配置</p></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let portData = [];

function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.className = 'toast toast-' + type + ' show';
  t.textContent = msg;
  setTimeout(() => t.classList.remove('show'), 4000);
}

function setLoading(btn, loading, textId, originalText) {
  if (loading) {
    btn.disabled = true;
    document.getElementById(textId).innerHTML = '<span class="spinner"></span> 处理中...';
  } else {
    btn.disabled = false;
    document.getElementById(textId).textContent = originalText;
  }
}

function renderTable(data) {
  const tbody = document.getElementById('portTable');
  portData = data.ports;

  if (!data.ports || data.ports.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty-state"><p>点击"一键初始化"开始配置</p></td></tr>';
    document.getElementById('btnChangeAll').style.display = 'none';
    return;
  }

  document.getElementById('btnChangeAll').style.display = '';

  const svcBadge = document.getElementById('serviceBadge');
  if (data.service === 'active') {
    svcBadge.className = 'badge badge-green';
    svcBadge.textContent = 'XrayL 运行中';
    svcBadge.style.display = '';
  } else {
    svcBadge.className = 'badge badge-red';
    svcBadge.textContent = 'XrayL 未运行';
    svcBadge.style.display = '';
  }

  let html = '';
  for (const p of data.ports) {
    const dotClass = p.bound ? 'green' : 'red';
    const statusText = p.bound ? '已绑定' : '未绑定';
    const ipv6Display = p.ipv6 || '--';

    html += `<tr>
      <td class="port-cell">${p.port}</td>
      <td class="ipv6-cell">${ipv6Display}</td>
      <td><span class="status-dot ${dotClass}"></span>${statusText}</td>
      <td style="text-align:right">
        <button class="btn btn-success btn-sm" onclick="doChangeOne(${p.port})" ${!p.ipv6 ? 'disabled' : ''}>换IP</button>
        <button class="btn btn-primary btn-sm" onclick="doCheck(${p.port})" ${!p.ipv6 ? 'disabled' : ''}>验证</button>
      </td>
    </tr>`;
  }
  tbody.innerHTML = html;
}

async function fetchStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    if (data.ok) renderTable(data);
  } catch(e) {
    showToast('获取状态失败: ' + e.message, 'error');
  }
}

async function doInit() {
  const btn = document.getElementById('btnInit');
  setLoading(btn, true, 'initText', '一键初始化');
  showToast('正在初始化，创建 IPv6 并配置 Xray...', 'info');
  try {
    const res = await fetch('/api/init', {method: 'POST'});
    const data = await res.json();
    if (data.ok) {
      showToast(data.message + '，共 ' + data.ports.length + ' 个端口', 'success');
      await fetchStatus();
    } else {
      showToast('初始化失败: ' + data.message, 'error');
    }
  } catch(e) {
    showToast('请求失败: ' + e.message, 'error');
  }
  setLoading(btn, false, 'initText', '一键初始化');
}

async function doChangeAll() {
  const btn = document.getElementById('btnChangeAll');
  setLoading(btn, true, 'changeAllText', '一键换全部 IP');
  showToast('正在更换全部 IP...', 'info');
  try {
    const allPorts = portData.map(p => p.port);
    const res = await fetch('/api/change', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ports: allPorts})
    });
    const data = await res.json();
    if (data.ok) {
      showToast(data.message, 'success');
      await fetchStatus();
    } else {
      showToast('更换失败: ' + data.message, 'error');
    }
  } catch(e) {
    showToast('请求失败: ' + e.message, 'error');
  }
  setLoading(btn, false, 'changeAllText', '一键换全部 IP');
}

async function doChangeOne(port) {
  showToast(`正在更换端口 ${port} 的 IP...`, 'info');
  try {
    const res = await fetch('/api/change', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({port: port})
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`端口 ${port} IP 已更换`, 'success');
      await fetchStatus();
    } else {
      showToast('更换失败: ' + data.message, 'error');
    }
  } catch(e) {
    showToast('请求失败: ' + e.message, 'error');
  }
}

async function doCheck(port) {
  showToast(`正在验证端口 ${port}...`, 'info');
  try {
    const res = await fetch('/api/check/' + port);
    const data = await res.json();
    if (data.ok) {
      showToast(`端口 ${port} 出口: ${data.exit_ipv6}`, 'success');
    } else {
      showToast(`端口 ${port} 验证失败`, 'error');
    }
  } catch(e) {
    showToast('请求失败: ' + e.message, 'error');
  }
}

fetchStatus();
</script>
</body>
</html>
